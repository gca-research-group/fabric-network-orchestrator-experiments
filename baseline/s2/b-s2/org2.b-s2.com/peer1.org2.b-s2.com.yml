services:
  peer1.org2.b-s2.com:
    container_name: peer1.org2.b-s2.com
    image: hyperledger/fabric-peer:2.5.15
    environment:
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_ID=peer1.org2.b-s2.com
      - CORE_PEER_ADDRESS=peer1.org2.b-s2.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.org2.b-s2.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.org2.b-s2.com:7051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_GOSSIP_STATE_ENABLED=true
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.peer1.org2.b-s2.com:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=b-s2
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_TLS_CLIENTAUTHREQUIRED=false
      - CORE_PEER_TLS_CLIENTCERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_CLIENTKEY_FILE=/etc/hyperledger/fabric/tls/server.key
    working_dir: /etc/hyperledger/fabric
    command: peer node start
    networks:
      - b-s2
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./org2.b-s2.com/data/certificate-authority/organizations/peerOrganizations/org2.b-s2.com/peers/peer1.org2.b-s2.com/msp:/etc/hyperledger/fabric/msp
      - ./org2.b-s2.com/data/certificate-authority/organizations/peerOrganizations/org2.b-s2.com/peers/peer1.org2.b-s2.com/tls:/etc/hyperledger/fabric/tls
      - ./org2.b-s2.com/data/peers/peer1/peer:/var/hyperledger/production
