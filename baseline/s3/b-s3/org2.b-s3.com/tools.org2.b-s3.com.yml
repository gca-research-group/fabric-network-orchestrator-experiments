services:
  tools.org2.b-s3.com:
    container_name: tools.org2.b-s3.com
    image: hyperledger/fabric-tools:2.5.15
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.org2.b-s3.com:7051
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/org2.b-s3.com/peerOrganizations/org2.b-s3.com/peers/peer0.org2.b-s3.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/org2.b-s3.com/peerOrganizations/org2.b-s3.com/peers/peer0.org2.b-s3.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/org2.b-s3.com/peerOrganizations/org2.b-s3.com/peers/peer0.org2.b-s3.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/org2.b-s3.com/peerOrganizations/org2.b-s3.com/users/Admin@org2.b-s3.com/msp
    volumes:
      - ./configtx.yml:/opt/gopath/src/github.com/hyperledger/fabric/configtx.yml
      - ./org2.b-s3.com/data/channels:/opt/gopath/src/github.com/hyperledger/fabric/channels
      - ./org2.b-s3.com/data/certificate-authority/organizations:/opt/gopath/src/github.com/hyperledger/fabric/org2.b-s3.com
      - ./org1.b-s3.com/data/certificate-authority/organizations/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/msp/cacerts:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/msp/cacerts

      - ./org1.b-s3.com/data/certificate-authority/organizations/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/msp/signcerts:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/msp/signcerts
      - ./org1.b-s3.com/data/certificate-authority/organizations/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/msp/tlscacerts:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/msp/tlscacerts
      - ./org1.b-s3.com/data/certificate-authority/organizations/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/tls/ca.crt:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/tls/ca.crt
      - ./org1.b-s3.com/data/certificate-authority/organizations/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/tls/server.crt:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/ordererOrganizations/org1.b-s3.com/orderers/orderer.org1.b-s3.com/tls/server.crt
      - ./org1.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org1.b-s3.com/msp/cacerts:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/peerOrganizations/org1.b-s3.com/msp/cacerts
      - ./org1.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org1.b-s3.com/msp/config.yaml:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/peerOrganizations/org1.b-s3.com/msp/config.yaml
      - ./org1.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org1.b-s3.com/peers/peer0.org1.b-s3.com/msp/signcerts:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/peerOrganizations/org1.b-s3.com/peers/peer0.org1.b-s3.com/msp/signcerts
      - ./org1.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org1.b-s3.com/peers/peer0.org1.b-s3.com/tls/ca.crt:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/peerOrganizations/org1.b-s3.com/peers/peer0.org1.b-s3.com/tls/ca.crt
      - ./org1.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org1.b-s3.com/peers/peer0.org1.b-s3.com/tls/server.crt:/opt/gopath/src/github.com/hyperledger/fabric/org1.b-s3.com/peerOrganizations/org1.b-s3.com/peers/peer0.org1.b-s3.com/tls/server.crt

      - ./org3.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org3.b-s3.com/msp/cacerts:/opt/gopath/src/github.com/hyperledger/fabric/org3.b-s3.com/peerOrganizations/org3.b-s3.com/msp/cacerts
      - ./org3.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org3.b-s3.com/msp/config.yaml:/opt/gopath/src/github.com/hyperledger/fabric/org3.b-s3.com/peerOrganizations/org3.b-s3.com/msp/config.yaml
      - ./org3.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org3.b-s3.com/peers/peer0.org3.b-s3.com/msp/signcerts:/opt/gopath/src/github.com/hyperledger/fabric/org3.b-s3.com/peerOrganizations/org3.b-s3.com/peers/peer0.org3.b-s3.com/msp/signcerts
      - ./org3.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org3.b-s3.com/peers/peer0.org3.b-s3.com/tls/ca.crt:/opt/gopath/src/github.com/hyperledger/fabric/org3.b-s3.com/peerOrganizations/org3.b-s3.com/peers/peer0.org3.b-s3.com/tls/ca.crt
      - ./org3.b-s3.com/data/certificate-authority/organizations/peerOrganizations/org3.b-s3.com/peers/peer0.org3.b-s3.com/tls/server.crt:/opt/gopath/src/github.com/hyperledger/fabric/org3.b-s3.com/peerOrganizations/org3.b-s3.com/peers/peer0.org3.b-s3.com/tls/server.crt
    networks:
      - b-s3
