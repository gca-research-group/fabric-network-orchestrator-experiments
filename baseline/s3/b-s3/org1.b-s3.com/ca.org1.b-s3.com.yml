services:
  ca.org1.b-s3.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.org1.b-s3.com
    tty: true
    stdin_open: true
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org1.b-s3.com
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_CSR_CN=ca.org1.b-s3.com
      - FABRIC_CA_SERVER_CSR_HOSTS=localhost,ca.org1.b-s3.com
    command: sh -c 'fabric-ca-server start -b admin:adminpw'
    volumes:
      - ./org1.b-s3.com/data/certificate-authority/fabric-ca-server:/etc/hyperledger/fabric-ca-server
      - ./org1.b-s3.com/data/certificate-authority/organizations:/etc/hyperledger/organizations
    networks:
      - b-s3
