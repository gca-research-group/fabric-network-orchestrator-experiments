Capabilities:
  Application: &ApplicationCapabilities
    V2_5: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Channel: &ChannelCapabilities
    V2_0: true
Organizations:
  - &Org1Orderer
    Name: Org1Orderer
    ID: Org1OrdererMSP
    MSPDir: ./org1.b-s5.com/ordererOrganizations/org1.b-s5.com/msp
    OrdererEndpoints:
      - orderer.org1.b-s5.com:7050
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org1OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('Org1OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('Org1OrdererMSP.admin')"
  - &Org1
    Name: Org1
    ID: Org1MSP
    MSPDir: ./org1.b-s5.com/peerOrganizations/org1.b-s5.com/msp
    AnchorPeers:
      - Host: peer0.org1.b-s5.com
        Port: 7051
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org1MSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('Org1MSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('Org1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org1MSP.peer')"
  - &Org2
    Name: Org2
    ID: Org2MSP
    MSPDir: ./org2.b-s5.com/peerOrganizations/org2.b-s5.com/msp
    AnchorPeers:
      - Host: peer0.org2.b-s5.com
        Port: 7051
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org2MSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('Org2MSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('Org2MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org2MSP.peer')"
  - &Org3
    Name: Org3
    ID: Org3MSP
    MSPDir: ./org2.b-s5.com/peerOrganizations/org3.b-s5.com/msp
    AnchorPeers:
      - Host: peer0.org2.b-s5.com
        Port: 7051
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org3MSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('Org3MSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('Org3MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org3MSP.peer')"

Orderer: &OrdererDefaults
  Addresses:
    - orderer.org1.b-s5.com:7050
  Capabilities:
    <<: *OrdererCapabilities
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "ANY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Organizations:
    - *Org1Orderer
Application: &ApplicationDefaults
  Policies:
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "ANY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "ANY Endorsement"
    Admins:
      Type: ImplicitMeta
      Rule: "ANY Admins"
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *ApplicationCapabilities
  Organizations:
    - *Org1
    - *Org2
    - *Org3
Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "ANY Admins"
  Capabilities:
    <<: *ChannelCapabilities
Profiles:
  TwoOrgsProfile:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      OrdererType: etcdraft
      BatchTimeout: 2s
      BatchSize:
        MaxMessageCount: 10
        AbsoluteMaxBytes: 99 MB
        PreferredMaxBytes: 512 KB
      etcdraft:
        Consenters:
          - Host: orderer.org1.-s5.com
            Port: 7050
            ClientTLSCert: ./org1.-s5.com/ordererOrganizations/org1.-s5.com/orderers/orderer.org1.-s5.com/tls/server.crt
            ServerTLSCert: ./org1.-s5.com/ordererOrganizations/org1.-s5.com/orderers/orderer.org1.-s5.com/tls/server.crt
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Org1
        - *Org2
      Capabilities:
        <<: *ApplicationCapabilities
  AllOrgsProfile:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      OrdererType: etcdraft
      BatchTimeout: 2s
      BatchSize:
        MaxMessageCount: 10
        AbsoluteMaxBytes: 99 MB
        PreferredMaxBytes: 512 KB
      etcdraft:
        Consenters:
          - Host: orderer.org1.-s5.com
            Port: 7050
            ClientTLSCert: ./org1.-s5.com/ordererOrganizations/org1.-s5.com/orderers/orderer.org1.-s5.com/tls/server.crt
            ServerTLSCert: ./org1.-s5.com/ordererOrganizations/org1.-s5.com/orderers/orderer.org1.-s5.com/tls/server.crt
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Org1
        - *Org2
        - *Org3
      Capabilities:
        <<: *ApplicationCapabilities
