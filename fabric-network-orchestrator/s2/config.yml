output: c2/output/fno-s2
network: fno-s2

capabilities:
  channel: V2_0
  orderer: V2_0
  application: V2_5

organizations:
  - name: Org1
    domain: org1.fno-s2.com
    orderers:
      - name: Orderer
        subdomain: orderer
    peers:
      - name: Peer0
        subdomain: peer0
      - name: Peer1
        subdomain: peer1

  - name: Org2
    domain: org2.fno-s2.com
    peers:
      - name: Peer0
        subdomain: peer0
      - name: Peer1
        subdomain: peer1

  - name: Org3
    domain: org3.fno-s2.com
    peers:
      - name: Peer0
        subdomain: peer0
      - name: Peer1
        subdomain: peer1

  - name: Org4
    domain: org4.fno-s2.com
    peers:
      - name: Peer0
        subdomain: peer0
      - name: Peer1
        subdomain: peer1

  - name: Org5
    domain: org5.fno-s2.com
    peers:
      - name: Peer0
        subdomain: peer0
      - name: Peer1
        subdomain: peer1

profiles:
  - &DefaultProfile
    name: DefaultProfile
    organizations:
      - Org1
      - Org2
      - Org3
      - Org4
      - Org5

channels:
  - name: defaultchannel
    profile: *DefaultProfile
