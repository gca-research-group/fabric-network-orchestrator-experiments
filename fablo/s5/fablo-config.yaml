$schema: https://github.com/hyperledger-labs/fablo/releases/download/2.6.0/schema.json

global:
  fabricVersion: 2.5.9
  tls: true
  peerDevMode: false

orgs:
  - organization:
      name: OrdererOrg
      domain: orderer.org1.fablo-s5.com
    orderers:
      - groupName: orderer-group
        type: raft
        instances: 1

  - organization:
      name: Org1
      domain: org1.fablo-s5.com
    peer:
      instances: 1

  - organization:
      name: Org2
      domain: org2.fablo-s5.com
    peer:
      instances: 1
  
  - organization:
      name: Org3
      domain: org3.fablo-s5.com
    peer:
      instances: 1

channels:
  - name: defaultchannel
    groupName: orderer-group
    orgs:
      - name: Org1
        peers: [peer0]
      - name: Org2
        peers: [peer0]
      - name: Org3
        peers: [peer0]

chaincodes:
  - name: Asset
    version: "1.0"
    lang: golang
    channel: defaultchannel
    directory: ./s5/chaincodes/asset

  - name: Product
    version: "1.0"
    lang: golang
    channel: defaultchannel
    directory: ./s5/chaincodes/product
    endorsement: "AND('Org1MSP.peer','Org2MSP.peer','Org3MSP.peer')"

  - name: PrivateAgreement
    version: "2.0"
    lang: golang
    channel: defaultchannel
    directory: ./s5/chaincodes/private-agreement
    privateData:
      name: private-agreement-collection
      orgNames:
        - Org1
        - Org2